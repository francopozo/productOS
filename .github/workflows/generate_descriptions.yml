name: Generate Airtable Descriptions

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task key from config.json"
        required: false
        type: string
        default: "descriptions"
      limit:
        description: "Max number of records to process"
        required: false
        type: string
      dry_run:
        description: "Run without updating Airtable"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TASK: ${{ github.event.inputs.task }}
      LIMIT: ${{ github.event.inputs.limit }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      LOAD_DOTENV: "false"
      GITHUB_ACTIONS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run description generator
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python scripts/generate_descriptions.py --limit "${{ github.event.inputs.limit }}"
          else
            python scripts/generate_descriptions.py
          fi
